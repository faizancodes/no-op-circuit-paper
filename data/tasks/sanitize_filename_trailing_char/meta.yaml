description: sanitize_filename() removes the last valid character from filenames
issue_text: 'The `sanitize_filename()` function is incorrectly removing the last character
  from valid filenames. For example, `sanitize_filename(''report.txt'')` returns `''report.tx''`
  instead of `''report.txt''`. The function should only remove invalid characters,
  not truncate valid ones.

  '
