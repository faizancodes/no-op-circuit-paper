issue_text: 'The `validate_file_extension()` function is rejecting valid file names
  like "document.PDF" or "image.JpG" even though the docstring states it should accept
  common image and document formats case-insensitively. For example, `validate_file_extension("report.PDF")`
  returns `False` when it should return `True`.

  '
