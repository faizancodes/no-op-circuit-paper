issue_text: "Defining the \"through\" model in a many-to-many field in another app\
  \ causes \"AttributeError: 'str' object has no attribute '_meta'\" on migration\n\
  Description\n\t\nI tried migrating my apps into the database, the three relevant\
  \ apps are called: \"fonte\", \"fonte_variavel\" and \"variavel\". fonte and variavel\
  \ models have a many-to-many relationship (field being defined on \"fonte\"). The\
  \ many-to-many field uses fonte_variavel model as the \"through\" argument. Below\
  \ are the models when I define them on separate apps.\n# core/fonte/models.py\n\
  class FonteModel(Model):\n\tnome = TextField(unique=True)\n\tdescricao = TextField()\n\
  \tdata_inicial = DateField()\n\tdata_final = DateField(blank=True, null=True)\n\t\
  variaveis = ManyToManyField(\"variavel.VariavelModel\", through=\"fonte_variavel.FonteVariavelModel\"\
  )\n\tdef __str__(self):\n\t\treturn self.nome\n\tclass Meta:\n\t\tdb_table = \"\
  fontes\"\n\t\tverbose_name = \"Fonte\"\n\t\tverbose_name_plural = \"Fontes\"\n#\
  \ core/variavel/models.py\nclass VariavelModel(Model):\n\tnome = TextField(unique=True)\n\
  \tdescricao = TextField()\n\tclass Meta:\n\t\tdb_table = 'variaveis'\n\t\tverbose_name\
  \ = 'Vari\xE1vel'\n\t\tverbose_name_plural = 'Vari\xE1veis'\n# core/fonte_variavel/models.py\n\
  class FonteVariavelModel(Model):\n\tvariavel = ForeignKey('variavel.VariavelModel',\
  \ on_delete=CASCADE)\n\tfonte = ForeignKey('fonte.FonteModel', on_delete=CASCADE)\n\
  \tclass Meta:\n\t\tdb_table = 'fontes_variaveis'\n\t\tverbose_name = 'Fonte'\n\t\
  \tverbose_name_plural = 'Fontes'\nGenerated migration file for Fonte\n# Generated\
  \ by Django 4.1 on 2022-08-17\u2026\n"
