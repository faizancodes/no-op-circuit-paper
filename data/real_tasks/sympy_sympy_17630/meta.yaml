  \ *\r\n>>> a = MatrixSymbol(\"a\", 2, 2)\r\n>>> z = ZeroMatrix(2, 2)\r\n>>> b =\
  \ BlockMatrix([[a, z], [z, z]])\r\n```\r\n\r\nthen block-multiplying it once seems\
  \ to work fine:\r\n\r\n```\r\n>>> block_collapse(b * b)\r\nMatrix([\r\n[a**2, 0],\r\
  \n[0, 0]])\r\n>>> b._blockmul(b)\r\nMatrix([\r\n[a**2, 0],\r\n[0, 0]])\r\n```\r\n\
  \r\nbut block-multiplying twice throws an exception:\r\n\r\n```\r\n>>> block_collapse(b\
