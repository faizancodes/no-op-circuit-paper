issue_text: "In v5.3, NDDataRef mask propagation fails when one of the operand does\
  \ not have a mask\n### Description\n\nThis applies to v5.3. \r\n\r\nIt looks like\
  \ when one of the operand does not have a mask, the mask propagation when doing\
  \ arithmetic, in particular with `handle_mask=np.bitwise_or` fails.  This is not\
  \ a problem in v5.2.\r\n\r\nI don't know enough about how all that works, but it\
  \ seems from the error that the operand without a mask is set as a mask of None's\
  \ and then the bitwise_or tries to operate on an integer and a None and fails.\n\
  \n### Expected behavior\n\nWhen one of the operand does not have mask, the mask\
  \ that exists should just be copied over to the output.  Or whatever was done in\
  \ that situation in v5.2 where there's no problem.\n\n### How to Reproduce\n\nThis\
  \ is with v5.3.   With v5.2, there are no errors.\r\n\r\n```\r\n>>> import numpy\
  \ as np\r\n>>> from astropy.nddata import NDDataRef\r\n\r\n>>> array = np.array([[0,\
  \ 1, 0], [1, 0, 1], [0, 1, 0]])\r\n>>> mask = np.array([[0, 1, 64], [8, 0, 1], [2,\
  \ 1, 0]])\r\n\r\n>>> nref_nomask = NDDataRef(array)\r\n>>> nref_mask = NDDataRef(array,\
  \ mask=mask)\r\n\r\n# multiply no mask by constant (no mask * no mask)\r\n>>> nref_nomask.multiply(1.,\
  \ handle_mask=np.bitwise_or).mask   # returns nothing, no mask,  OK\r\n\r\n# multiply\
  \ no mask by itself (no mask * no mask)\r\n>>> nref_nomask.multiply(nref_nomask,\
  \ handle_mask=np.bitwise_or).mask # return nothing, no mask, OK\r\n\r\n# multiply\
  \ mask by constant (mask * no mask)\r\n>>> nref_mask.multiply(1., handle_mask=np.bitwise_or).mask\r\
  \n..\u2026\n"
