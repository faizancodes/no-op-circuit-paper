issue_text: "Query optimization in YearLookup breaks filtering by \"__iso_year\"\n\
  Description\n\t \n\t\t(last modified by Florian Demmer)\n\t \nThe optimization to\
  \ use BETWEEN instead of the EXTRACT operation in \u200BYearLookup is also registered\
  \ for the \u200B\"__iso_year\" lookup, which breaks the functionality provided by\
  \ \u200BExtractIsoYear when used via the lookup.\nThis has unfortunately been broken\
  \ ever since ExtractIsoYear was introduced in \u200BDjango 2.2 via #28649 and wasn't\
  \ easy to track down since ExtractIsoYear when used by itself eg. in an annotation\
  \ works perfectly fine. Just when using the lookup in a filter, the optimization\
  \ is used (even when explicitly using an annotation):\n# annotation works\n>>> qs\
  \ = DTModel.objects.annotate(extracted=ExtractIsoYear('start_date')).only('id')\n\
  >>> print(qs.query)\nSELECT \"db_functions_dtmodel\".\"id\", EXTRACT('isoyear' FROM\
  \ \"db_functions_dtmodel\".\"start_date\") AS \"extracted\" FROM \"db_functions_dtmodel\"\
  \n# explicit annotation used in filter does not use \"extracted\" and adds BETWEEN\n\
  >>> print(qs.filter(extracted=2020).query)\nSELECT \"db_functions_dtmodel\".\"id\"\
  , EXTRACT('isoyear' FROM \"db_functions_dtmodel\".\"start_date\") AS \"extracted\"\
  \ FROM \"db_functions_dtmodel\" WHERE \"db_functions_dtmodel\".\"start_date\" BETWEEN\
  \ 2020-01-01 AND 2020-12-31\n# implicit lookup uses BETWEEN\n>>> print(DTModel.objects.filter(start_date__iso_year=2020).only('id').query)\n\
  SELECT \"db_functions_dtmodel\".\"id\" FROM \"db_functions_dtmodel\" WHERE \"db_functions_dtmodel\"\
  .\"start_date\" BETWEEN 2020-01-01 AND 2020\u2026\n"
primary_file: operations.py
test_command: pytest -q test_extract_iso_year_func_boundaries (db_functions.datetime.test_extract_trunc.DateFunctionTests)
