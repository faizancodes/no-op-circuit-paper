issue_text: "Abstract model field should not be equal across models\nDescription\n\
  \t\nConsider the following models:\nclass A(models.Model):\n\tclass Meta:\n\t\t\
  abstract = True\n\tmyfield = IntegerField()\nclass B(A):\n\tpass\nclass C(A):\n\t\
  pass\nIf I pull the fields of B and C into a shared set, one will be de-duplicated\
  \ away, because they compare as equal. I found this surprising, though in practice\
  \ using a list was sufficient for my need. The root of the issue is that they compare\
  \ equal, as fields only consider self.creation_counter when comparing for equality.\n\
  len({B._meta.get_field('myfield'), C._meta.get_field('myfield')}) == 1\nB._meta.get_field('myfield')\
  \ == C._meta.get_field('myfield')\nWe should adjust __eq__ so that if the field.model\
  \ is different, they will compare unequal. Similarly, it is probably wise to adjust\
  \ __hash__ and __lt__ to match.\nWhen adjusting __lt__, it may be wise to order\
  \ first by self.creation_counter so that cases not affected by this equality collision\
  \ won't be re-ordered. In my experimental branch, there was one test that broke\
  \ if I ordered them by model first.\nI brought this up on IRC django-dev to check\
  \ my intuitions, and those conversing with me there seemed to agree that the current\
  \ behavior is not intuitive.\n\n"
primary_file: __init__.py
test_command: pytest -q Field instances from abstract models are not equal.
expected_action:
  buggy: edit
  fixed: noop
