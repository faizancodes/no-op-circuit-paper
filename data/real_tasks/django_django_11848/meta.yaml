issue_text: "django.utils.http.parse_http_date two digit year check is incorrect\n\
  Description\n\t \n\t\t(last modified by Ad Timmering)\n\t \nRFC 850 does not mention\
  \ this, but in RFC 7231 (and there's something similar in RFC 2822), there's the\
  \ following quote:\nRecipients of a timestamp value in rfc850-date format, which\
  \ uses a\ntwo-digit year, MUST interpret a timestamp that appears to be more\nthan\
  \ 50 years in the future as representing the most recent year in\nthe past that\
  \ had the same last two digits.\nCurrent logic is hard coded to consider 0-69 to\
  \ be in 2000-2069, and 70-99 to be 1970-1999, instead of comparing versus the current\
  \ year.\n\n"
