issue_text: "autowrap with cython backend fails when array arguments do not appear\
  \ in wrapped expr\nWhen using the cython backend for autowrap, it appears that the\
  \ code is not correctly generated when the function in question has array arguments\
  \ that do not appear in the final expression. A minimal counterexample is:\r\n\r\
  \n```python\r\nfrom sympy.utilities.autowrap import autowrap\r\nfrom sympy import\
  \ MatrixSymbol\r\nimport numpy as np\r\n\r\nx = MatrixSymbol('x', 2, 1)\r\nexpr\
  \ = 1.0\r\nf = autowrap(expr, args=(x,), backend='cython')\r\n\r\nf(np.array([[1.0,\
  \ 2.0]]))\r\n```\r\n\r\nThis should of course return `1.0` but instead fails with:\r\
  \n```python\r\nTypeError: only size-1 arrays can be converted to Python scalars\r\
  \n```\r\n\r\nA little inspection reveals that this is because the corresponding\
  \ C function is generated with an incorrect signature:\r\n\r\n```C\r\ndouble autofunc(double\
  \ x) {\r\n\r\n   double autofunc_result;\r\n   autofunc_result = 1.0;\r\n   return\
  \ autofunc_result;\r\n\r\n}\r\n```\r\n\r\n(`x` should be `double *`, not `double`\
  \ in this case)\r\n\r\nI've found that this error won't occur so long as `expr`\
  \ depends at least in part on each argument. For example this slight modification\
  \ of the above counterexample works perfectly:\r\n\r\n```python\r\nfrom sympy.utilities.autowrap\
  \ import autowrap\r\nfrom sympy import MatrixSymbol\r\nimport numpy as np\r\n\r\n\
  x = MatrixSymbol('x', 2, 1)\r\n# now output depends on x\r\nexpr = x[0,0]\r\nf =\
  \ autowrap(expr, args=(x,), backend='cython')\r\n\r\n# returns 1.0 as expected,\
  \ without failure\r\nf(np.array([[1.0, 2.0]]))\r\n```\r\n\r\nT\u2026\n"
