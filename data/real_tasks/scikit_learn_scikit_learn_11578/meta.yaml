issue_text: "For probabilistic scorers, LogisticRegressionCV(multi_class='multinomial')\
  \ uses OvR to calculate scores\nDescription:\r\n\r\nFor scorers such as `neg_log_loss`\
  \ that use `.predict_proba()` to get probability estimates out of a classifier,\
  \ the predictions used to generate the scores for `LogisticRegression(multi_class='multinomial')`\
  \ do not seem to be the same predictions as those generated by the `.predict_proba()`\
  \ method of `LogisticRegressionCV(multi_class='multinomial')`. The former uses a\
  \ single logistic function and normalises (one-v-rest approach), whereas the latter\
  \ uses the softmax function (multinomial approach).\r\n\r\nThis appears to be because\
  \ the `LogisticRegression()` instance supplied to the scoring function at line 955\
  \ of logistic.py within the helper function `_log_reg_scoring_path()`,\r\n(https://github.com/scikit-learn/scikit-learn/blob/master/sklearn/linear_model/logistic.py#L955)\r\
  \n`scores.append(scoring(log_reg, X_test, y_test))`,\r\nis initialised,\r\n(https://github.com/scikit-learn/scikit-learn/blob/master/sklearn/linear_model/logistic.py#L922)\r\
  \n`log_reg = LogisticRegression(fit_intercept=fit_intercept)`,\r\nwithout a multi_class\
  \ argument, and so takes the default, which is `multi_class='ovr'`.\r\n\r\nIt seems\
  \ like altering L922 to read\r\n`log_reg = LogisticRegression(fit_intercept=fit_intercept,\
  \ multi_class=multi_class)`\r\nso that the `LogisticRegression()` instance supplied\
  \ to the scoring function at line 955 inherits the `multi_class` option specified\
  \ in `LogisticRegressio\u2026\n"
