issue_text: "GaussianMixture predict and fit_predict disagree when n_init>1\n####\
  \ Description\r\nWhen `n_init` is specified in GaussianMixture, the results of fit_predict(X)\
  \ and predict(X) are often different.  The `test_gaussian_mixture_fit_predict` unit\
  \ test doesn't catch this because it does not set `n_init`.\r\n\r\n#### Steps/Code\
  \ to Reproduce\r\n```\r\npython\r\nfrom sklearn.mixture import GaussianMixture\r\
  \nfrom sklearn.utils.testing import assert_array_equal\r\nimport numpy\r\nX = numpy.random.randn(1000,5)\r\
  \nprint 'no n_init'\r\ngm = GaussianMixture(n_components=5)\r\nc1 = gm.fit_predict(X)\r\
  \nc2 = gm.predict(X)\r\nassert_array_equal(c1,c2)\r\nprint 'n_init=5'\r\ngm = GaussianMixture(n_components=5,\
  \ n_init=5)\r\nc1 = gm.fit_predict(X)\r\nc2 = gm.predict(X)\r\nassert_array_equal(c1,c2)\r\
  \n```\r\n\r\n#### Expected Results\r\n```\r\nno n_init\r\nn_init=5\r\n```\r\nNo\
  \ exceptions.\r\n\r\n#### Actual Results\r\n```\r\nno n_init\r\nn_init=5\r\nTraceback\
  \ (most recent call last):\r\n  File \"test_gm.py\", line 17, in <module>\r\n  \
  \  assert_array_equal(c1,c2)\r\n  File \"/home/scott/.local/lib/python2.7/site-packages/numpy/testing/_private/utils.py\"\
  , line 872, in assert_array_equal\r\n    verbose=verbose, header='Arrays are not\
  \ equal')\r\n  File \"/home/scott/.local/lib/python2.7/site-packages/numpy/testing/_private/utils.py\"\
  , line 796, in assert_array_compare\r\n    raise AssertionError(msg)\r\nAssertionError:\
  \ \r\nArrays are not equal\r\n\r\n(mismatch 88.6%)\r\n x: array([4, 0, 1, 1, 1,\
  \ 3, 3, 4, 4, 2, 0, 0, 1, 2, 0, 2, 0, 1, 3, 1, 1, 3,\r\n       2, 1, 0, 2, 1, 0,\
  \ 2, 0, 3, 1, 2, 3,\u2026\n"
