issue_text: "ModelChoiceField does not provide value of invalid choice when raising\
  \ ValidationError\nDescription\n\t \n\t\t(last modified by Aaron Wiegel)\n\t \n\
  Compared with ChoiceField and others, ModelChoiceField does not show the value of\
  \ the invalid choice when raising a validation error. Passing in parameters with\
  \ the invalid value and modifying the default error message for the code invalid_choice\
  \ should fix this.\nFrom source code:\nclass ModelMultipleChoiceField(ModelChoiceField):\n\
  \t\"\"\"A MultipleChoiceField whose choices are a model QuerySet.\"\"\"\n\twidget\
  \ = SelectMultiple\n\thidden_widget = MultipleHiddenInput\n\tdefault_error_messages\
  \ = {\n\t\t'invalid_list': _('Enter a list of values.'),\n\t\t'invalid_choice':\
  \ _('Select a valid choice. %(value)s is not one of the'\n\t\t\t\t\t\t\t' available\
  \ choices.'),\n\t\t'invalid_pk_value': _('\u201C%(pk)s\u201D is not a valid value.')\n\
  \t}\n\t...\nclass ModelChoiceField(ChoiceField):\n\t\"\"\"A ChoiceField whose choices\
  \ are a model QuerySet.\"\"\"\n\t# This class is a subclass of ChoiceField for purity,\
  \ but it doesn't\n\t# actually use any of ChoiceField's implementation.\n\tdefault_error_messages\
  \ = {\n\t\t'invalid_choice': _('Select a valid choice. That choice is not one of'\n\
  \t\t\t\t\t\t\t' the available choices.'),\n\t}\n\t...\n\n"
