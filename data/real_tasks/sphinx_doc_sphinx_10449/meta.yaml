issue_text: "`autodoc_typehints = \"description\"` causes autoclass to put a return\
  \ type\n### Describe the bug\r\n\r\nUsing the `autodoc_typehints = \"description\"\
  ` option causes Sphinx's `autoclass` to include the class's \"return type\" for\
  \ code such as this:\r\n```py\r\nclass Square:\r\n    \"\"\"A class representing\
  \ a square figure.\"\"\"\r\n\r\n    def __init__(self, width: int, height: int)\
  \ -> None:\r\n        self.width = width\r\n        self.height = height\r\n```\r\
  \n\r\n### How to Reproduce\r\n\r\n<details>\r\n<summary>Old repro, the repository\
  \ no longer exists</summary>\r\n\r\n```\r\n$ git clone https://github.com/jack1142/sphinx-issue-9575\r\
  \n$ cd sphinx-issue-9575\r\n$ pip install sphinx\r\n$ cd docs\r\n$ make html\r\n\
  $ # open _build/html/index.html and see the issue\r\n```\r\n\r\n</details>\r\n\r\
  \n\r\n\r\n1. Create a folder.\r\n2. Inside that folder create files:\r\n- `sample_package/__init__.py`:\r\
  \n```py\r\nclass Square:\r\n    \"\"\"A class representing a square figure.\"\"\"\
  \r\n\r\n    def __init__(self, width: int, height: int) -> None:\r\n        self.width\
  \ = width\r\n        self.height = height\r\n```\r\n- `docs/index.rst`:\r\n```rst\r\
  \n.. sphinx-issue-9575 documentation master file, created by\r\n   sphinx-quickstart\
  \ on Tue Aug 24 14:09:36 2021.\r\n   You can adapt this file completely to your\
  \ liking, but it should at least\r\n   contain the root `toctree` directive.\r\n\
  \r\nWelcome to sphinx-issue-9575's documentation!\r\n=============================================\r\
  \n\r\n.. autoclass:: sample_package.Square\r\n   :members:\r\n\r\n.. toctree::\r\
  \n   :maxdepth: 2\r\n   :caption: Contents:\u2026\n"
