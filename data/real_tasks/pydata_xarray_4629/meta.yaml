  \ product should be able to be changed without having any effect on the sources.\r\
  \n\r\n**Minimal Complete Verifiable Example**:\r\n```python\r\n>>> import xarray\
  \ as xr\r\n>>> xds1 = xr.Dataset(attrs={'a':'b'})\r\n>>> xds2 = xr.Dataset(attrs={'a':'c'})\r\
  \n>>> print(f\"a1: {xds1.a}, a2: {xds2.a}\")\r\na1: b, a2: c\r\n>>> xds3 = xr.merge([xds1,\
