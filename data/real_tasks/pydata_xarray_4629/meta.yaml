  \r\nBug reports that follow these guidelines are easier to diagnose, and so are\
  \ often handled much more quickly.\r\n-->\r\n\r\n**What happened**:\r\nAfter a merge,\
  \ an attribute value change in the merged product is reflected in the first source.\r\
