  \ \"/Users/dstansby/miniconda3/lib/python3.7/site-packages/astropy/coordinates/sky_coordinate.py\"\
  , line 600, in __getattr__\r\n    .format(self.__class__.__name__, attr))\r\nAttributeError:\
  \ 'custom_coord' object has no attribute 'prop'\r\n```\n\n"
