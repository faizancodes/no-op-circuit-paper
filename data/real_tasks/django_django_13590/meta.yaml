issue_text: "Upgrading 2.2>3.0 causes named tuples used as arguments to __range to\
  \ error.\nDescription\n\t\nI noticed this while upgrading a project from 2.2 to\
  \ 3.0.\nThis project passes named 2-tuples as arguments to range queryset filters.\
  \ This works fine on 2.2. On 3.0 it causes the following error: TypeError: __new__()\
  \ missing 1 required positional argument: 'far'.\nThis happens because django.db.models.sql.query.Query.resolve_lookup_value\
  \ goes into the tuple elements to resolve lookups and then attempts to reconstitute\
  \ the tuple with the resolved elements.\nWhen it attempts to construct the new tuple\
  \ it preserves the type (the named tuple) but it passes a iterator to it's constructor.\n\
  NamedTuples don't have the code path for copying an iterator, and so it errors on\
  \ insufficient arguments.\nThe fix is to * expand the contents of the iterator into\
  \ the constructor.\n\n"
primary_file: query.py
test_command: pytest -q test_range_lookup_namedtuple (expressions.tests.IterableLookupInnerExpressionsTests)
